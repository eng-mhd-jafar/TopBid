version: '3.8'
services:
  # خدمة الباك-أند (Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: auction-app
    container_name: auction-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - auction-network

  # خدمة قاعدة البيانات (MySQL)
  db:
    image: mysql:8.0
    container_name: auction-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - auction-network

networks:
  auction-network:
    driver: bridge

volumes:
  dbdata: